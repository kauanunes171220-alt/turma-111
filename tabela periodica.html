<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        /* ==================== VARIÁVEIS E RESET ==================== */
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --ametal: #10b981;
            --gas-nobre: #8b5cf6;
            --alcalino: #ef4444;
            --alcalino-terroso: #f59e0b;
            --semimetal: #06b6d4;
            --halogenio: #f43f5e;
            --outro-metal: #3b82f6;
            --metal-transicao: #eab308;
            --lantanideo: #ec4899;
            --actinideo: #d946ef;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            min-height: 100vh;
        }

        /* ==================== CABEÇALHO E PESQUISA ==================== */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1.5rem;
        }

        h1 { 
            font-size: 2.2rem; 
            text-align: center; 
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-container input:focus {
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .search-container::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.7;
        }

        /* ==================== LEGENDA ==================== */
        .legenda {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 1000px;
            margin-bottom: 1rem;
        }

        .legenda-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .legenda-item:hover { background: rgba(255, 255, 255, 0.1); }
        .cor-box { width: 12px; height: 12px; border-radius: 50%; }

        /* ==================== CONTAINER MOBILE FRIENDLY ==================== */
        .tabela-container {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
        }

        .tabela-container::-webkit-scrollbar { height: 8px; }
        .tabela-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; margin: 0 20px; }
        .tabela-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .tabela-container::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* ==================== GRID DA TABELA ==================== */
        .tabela-periodica {
            display: grid;
            grid-template-columns: repeat(18, 65px);
            grid-template-rows: repeat(10, 70px);
            gap: 6px;
            min-width: 1280px; 
            margin: 0 auto;
        }

        .elemento {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Efeito de Pesquisa / Hover da Legenda */
        .elemento.dimmed {
            opacity: 0.15;
            filter: grayscale(80%);
            pointer-events: none;
            transform: scale(0.95);
        }

        .elemento:hover {
            transform: scale(1.15);
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            border-color: currentColor;
            background: var(--surface-color);
        }

        .elemento .numero { font-size: 0.65rem; position: absolute; top: 4px; left: 6px; font-weight: 600; opacity: 0.7; }
        .elemento .simbolo { font-size: 1.3rem; font-weight: 800; margin-top: 6px; }
        .elemento .nome { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; margin-top: 2px; }

        /* Cores Dinâmicas */
        .ametal { color: var(--ametal); box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.1); }
        .gas-nobre { color: var(--gas-nobre); box-shadow: inset 0 0 10px rgba(139, 92, 246, 0.1); }
        .alcalino { color: var(--alcalino); box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.1); }
        .alcalino-terroso { color: var(--alcalino-terroso); box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.1); }
        .semimetal { color: var(--semimetal); box-shadow: inset 0 0 10px rgba(6, 182, 212, 0.1); }
        .halogenio { color: var(--halogenio); box-shadow: inset 0 0 10px rgba(244, 63, 94, 0.1); }
        .outro-metal { color: var(--outro-metal); box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.1); }
        .metal-transicao { color: var(--metal-transicao); box-shadow: inset 0 0 10px rgba(234, 179, 8, 0.1); }
        .lantanideo { color: var(--lantanideo); box-shadow: inset 0 0 10px rgba(236, 72, 153, 0.1); }
        .actinideo { color: var(--actinideo); box-shadow: inset 0 0 10px rgba(217, 70, 239, 0.1); }

        /* ==================== MODAL (JANELA DE DETALHES) ==================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 100;
            padding: 1rem;
        }

        .modal-overlay.ativo { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--surface-color); padding: 2.5rem 2rem; border-radius: 16px;
            max-width: 420px; width: 100%; text-align: center;
            transform: translateY(30px) scale(0.95); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1); position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.ativo .modal-content { transform: translateY(0) scale(1); }

        .btn-fechar {
            position: absolute; top: 15px; right: 20px; background: none; border: none;
            color: var(--text-muted); font-size: 2rem; cursor: pointer; transition: color 0.2s;
            line-height: 1;
        }
        .btn-fechar:hover { color: white; }
        
        #modal-simbolo { font-size: 4rem; margin: 0; font-weight: 800; text-shadow: 0 0 20px currentColor; }
        #modal-nome { font-size: 1.8rem; margin-bottom: 0.2rem; font-weight: 600; }
        #modal-categoria { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1.5rem; opacity: 0.9; font-weight: 600; }
        
        .info-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            text-align: left; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px;
            font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.05);
        }

        .info-full { grid-column: 1 / -1; margin-top: 5px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .instrucao-mobile { display: none; margin-bottom: 1rem; color: var(--text-muted); font-size: 0.9rem; }

        @media (max-width: 768px) {
            .instrucao-mobile { display: block; }
            h1 { font-size: 1.5rem; }
            .legenda { display: none; /* Oculta no celular para economizar espaço */ }
        }
    </style>
</head>

            [99, 'Es', 'Einstênio', '252', 10, 14, 10, 'Pesquisa científica.'],
            [100, 'Fm', 'Férmio', '257', 10, 15, 10, 'Pesquisa científica.'],
            [101, 'Md', 'Mendelévio', '258', 10, 16, 10, 'Pesquisa científica.'],
            [102, 'No', 'Nobélio', '259', 10, 17, 10, 'Pesquisa científica.'],
            [103, 'Lr', 'Laurêncio', '266', 10, 18, 10, 'Pesquisa científica.']
        ];

        const todosElementos = [...elementosBase, ...lantanideos, ...actinideos];
        const gridTabela = document.getElementById('tabela-grid');
        const legendaContainer = document.getElementById('legenda-container');

        // Construir a Legenda Dinamicamente
        Object.values(categorias).forEach(cat => {
            const item = document.createElement('div');
            item.className = 'legenda-item';
            
            const corBox = document.createElement('span');
            corBox.className = 'cor-box';
            corBox.style.backgroundColor = `var(--${cat.id})`;
            
            item.appendChild(corBox);
            item.appendChild(document.createTextNode(cat.nome));
            
            // Highlight na categoria ao passar o mouse na legenda (QoL)
            item.addEventListener('mouseenter', () => {
                document.querySelectorAll('.elemento').forEach(el => el.classList.add('dimmed'));
                document.querySelectorAll(`.${cat.id}`).forEach(el => el.classList.remove('dimmed'));
            });
            item.addEventListener('mouseleave', () => {
                document.querySelectorAll('.elemento').forEach(el => el.classList.remove('dimmed'));
                // Retrigger a pesquisa se houver algo digitado
                document.getElementById('search-input').dispatchEvent(new Event('input'));
            });

            legendaContainer.appendChild(item);
        });

        // Construir a Tabela
        todosElementos.forEach(dado => {
            const [num, sim, nom, mas, catId, col, lin, uso] = dado;
            const categoria = categorias[catId];

            const div = document.createElement('div');
            div.className = `elemento ${categoria.id}`;
            div.style.gridColumn = col;
            div.style.gridRow = lin;
            
            // Salvando os dados no DOM para pesquisa rápida
            div.dataset.nome = nom.toLowerCase();
            div.dataset.simbolo = sim.toLowerCase();
            div.dataset.numero = num;
            div.dataset.massa = mas;

            div.innerHTML = `
                <span class="numero">${num}</span>
                <span class="simbolo">${sim}</span>
                <span class="nome">${nom}</span>
            `;

            div.addEventListener('click', () => {
                const corElemento = window.getComputedStyle(div).color;

                document.getElementById('modal-nome').innerText = nom;
                document.getElementById('modal-simbolo').innerText = sim;
                document.getElementById('modal-simbolo').style.color = corElemento;
                document.getElementById('modal-numero').innerText = num;
                document.getElementById('modal-massa').innerText = mas;
                document.getElementById('modal-categoria').innerText = categoria.nome;
                document.getElementById('modal-categoria').style.color = corElemento;
                document.getElementById('modal-uso').innerText = uso;

                document.getElementById('modal').classList.add('ativo');
            });

            gridTabela.appendChild(div);
        });

        // Lógica de Pesquisa
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            const elementosCards = document.querySelectorAll('.elemento');

            elementosCards.forEach(el => {
                const pNome = el.dataset.nome;
                const pSimbolo = el.dataset.simbolo;
                const pNumero = el.dataset.numero;
                const pMassa = el.dataset.massa;

                if (term === '') {
                    el.classList.remove('dimmed');
                } else if (pNome.includes(term) || pSimbolo.includes(term) || pNumero.includes(term) || pMassa.includes(term)) {
                    el.classList.remove('dimmed');
                } else {
                    el.classList.add('dimmed');
                }
            });
        });

        // Modal Close
        const modal = document.getElementById('modal');
        function fecharModal() { modal.classList.remove('ativo'); }
        modal.addEventListener('click', (e) => { if(e.target === modal) fecharModal(); });
        
        // Fechar modal no botão ESC
        document.addEventListener('keydown', (e) => {
            if(e.key === "Escape") fecharModal();
        });
    </script>
</body>
</html>
